<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMS | Android Device Management Suite</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #deff9a;
            --accent-glow: rgba(222, 255, 154, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Fondo Animado de Gradientes */
        .bg-anim {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1f12 0%, #050505 80%);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }

        .container {
            max-width: 700px;
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: -3px;
        }

        .tagline { color: #888; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

        .btn-download {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            display: inline-block;
            cursor: pointer;
        }

        .btn-download:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.05);
        }

        .code-box {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin: 40px auto;
            max-width: 500px;
            color: #ccc;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="bg-anim"></div>

    <div class="container">
        <h1>ADMS</h1>
        <p class="tagline">ANDROID DEVICE MANAGEMENT SUITE</p>
        
        <div class="code-box">
            $ sudo ./setup.sh --install-full
        </div>

        <a href="https://github.com/thiago-202611/ADMS/releases/download/v1.0.0/ADMS_v1.0.tar.gz" class="btn-download">
            DOWNLOAD V1.0.0
        </a>
    </div>

</body>
</html>
